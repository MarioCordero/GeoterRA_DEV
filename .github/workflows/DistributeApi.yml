name: Distribución de API a Develop, Web y Mobile (Solo carpeta API/)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-sync:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          token: ${{ secrets.GH_PAT }} # Requerido si tienes ramas protegidas

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql 
          
      - name: Instalar Dependencias
        working-directory: ./API
        run: composer install --no-interaction --prefer-dist

      - name: Preparar Base de Datos MySQL
        working-directory: ./API
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE GeoterRA;"
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE GeoterRA_test;"
          mysql -h 127.0.0.1 -u root -proot GeoterRA < tests/Fixtures/database_schema.sql

      - name: Ejecutar Pruebas Unitarias
        working-directory: ./API
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASS: root
        run: ./vendor/bin/phpunit 

      - name: Configurar usuario de Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin # Nos aseguramos de tener todas las ramas remotas actualizadas

      # --- SINCRONIZACIÓN EXCLUSIVA DE LA CARPETA API/ ---

      - name: Sincronizar API en develop
        run: |
          git checkout develop || git checkout -b develop origin/develop
          rm -rf API/
          git checkout origin/API -- API/
          git add API/
          if ! git diff --cached --quiet; then
            git commit -m "🚀 CI: Auto-sync de la carpeta API/ desde rama API"
            git push origin develop
          else
            echo "No hay cambios nuevos en API para la rama develop."
          fi

      - name: Sincronizar API en web
        run: |
          git checkout web || git checkout -b web origin/web
          rm -rf API/
          git checkout origin/API -- API/
          git add API/
          if ! git diff --cached --quiet; then
            git commit -m "🚀 CI: Auto-sync de la carpeta API/ desde rama API"
            git push origin web
          else
            echo "No hay cambios nuevos en API para la rama web."
          fi

      - name: Sincronizar API en mobile
        run: |
          git checkout mobile || git checkout -b mobile origin/mobile
          rm -rf API/
          git checkout origin/API -- API/
          git add API/
          if ! git diff --cached --quiet; then
            git commit -m "🚀 CI: Auto-sync de la carpeta API/ desde rama API"
            git push origin mobile
          else
            echo "No hay cambios nuevos en API para la rama mobile."
          fi
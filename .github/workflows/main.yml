name: Deploy API, Mobile, and Website to Main  

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  force-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------- SET SOURCE BRANCH ----------------
      - name: Set source branch
        run: |
          echo "SOURCE_BRANCH=develop" >> $GITHUB_ENV

      # ---------------- CHECKOUT SOURCE (develop) ----------------
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      # ---------------- BUILD FRONTEND ----------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Frontend
        run: |
          cd website
          npm install
          npm run build

      # ---------------- CHECKOUT MAIN (into subdirectory) ----------------
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ---------------- CLEAN & SYNC ONLY REQUIRED FOLDERS ----------------
      - name: Clean main-branch and copy only API, Mobile, website
        run: |
          # Remove everything in main-branch except .git
          find main-branch -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Copy the three required folders from develop
          if [ -d "API" ]; then
            rsync -av --delete API/ main-branch/API/
          fi
          if [ -d "Mobile" ]; then
            rsync -av --delete Mobile/ main-branch/Mobile/
          fi
          if [ -d "website" ]; then
            rsync -av --delete website/ main-branch/website/
          fi

          # Copy any essential root files (adjust as needed)
          for file in .env.example pull.sh .htaccess; do
            if [ -f "$file" ]; then
              cp -v "$file" main-branch/
            fi
          done

      # ---------------- INJECT FRESH BUILD (dist) ----------------
      - name: Inject fresh build into main-branch/website/dist
        run: |
          if [ -d "website/dist" ]; then
            echo "Injecting fresh build..."
            mkdir -p main-branch/website/dist
            rsync -av --delete website/dist/ main-branch/website/dist/
          fi

      # ---------------- PRODUCTION CONFIG & CLEANUP ----------------
      - name: Production configuration
        run: |
          # Create production .env
          echo "APP_ENV=${{ secrets.APP_ENV }}" > main-branch/.env

          # Remove forbidden PHP files
          find main-branch/API -name "(DELETE)*.php" -delete 2>/dev/null || true

          # Ensure .htaccess exists in dist (copy from dist or root)
          if [ -f "main-branch/website/dist/.htaccess" ]; then
            echo ".htaccess already in dist"
          elif [ -f "main-branch/.htaccess" ]; then
            cp main-branch/.htaccess main-branch/website/dist/.htaccess
          elif [ -f "website/dist/.htaccess" ]; then
            cp website/dist/.htaccess main-branch/website/dist/.htaccess
          fi

          # Make pull.sh executable
          if [ -f "main-branch/pull.sh" ]; then
            chmod +x main-branch/pull.sh
          fi

      # ---------------- COMMIT & PUSH TO MAIN ----------------
        - name: Commit and push changes to main
          run: |
            cd main-branch

            git config user.name "MarioCordero (CI)"
            git config user.email "ci+${{ github.repository_owner }}@users.noreply.github.com"

            # Stage deletions for removed files
            git add -A

            # Force-add dist and config (already covered by -A, but kept for safety)
            if [ -d "website/dist" ]; then
              git add -f website/dist/
            fi
            if [ -d "API/config" ]; then
              git add -f API/config/ 2>/dev/null || true
            fi

            if git diff --cached --quiet; then
              echo "No changes to deploy"
              exit 0
            fi

          git commit -m "🚀 Deploy API, Mobile, website from ${{ env.SOURCE_BRANCH }} [$(date +'%Y-%m-%d %H:%M:%S')]"

          # Push to main using PAT
          git push "https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git" HEAD:main --force

      # ---------------- TRIGGER REMOTE DEPLOY ----------------
      - name: Trigger remote deploy
        run: |
          curl -X GET "http://163.178.171.105/pull.sh"
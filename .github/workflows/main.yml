name: Deploy API, Mobile, Website, Database to Main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  force-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------- SET SOURCE BRANCH ----------------
      - name: Set source branch
        run: |
          echo "SOURCE_BRANCH=develop" >> $GITHUB_ENV

      # ---------------- CHECKOUT SOURCE (develop) ----------------
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      # ---------------- BUILD FRONTEND ----------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Frontend
        run: |
          cd website
          npm install
          npm run build

      # ---------------- CHECKOUT MAIN (into subdirectory) ----------------
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ---------------- CLEAN & SYNC REQUIRED FOLDERS ----------------
      - name: Clean main-branch and copy only API, Mobile, website, database
        run: |
          # 1. Limpieza total de main-branch (excepto .git)
          find main-branch -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # 2. Copiar carpetas permitidas
          # Añadimos 'database' al bucle para que se sincronice
          for dir in API Mobile website database; do
            if [ -d "$dir" ]; then
              echo "Copiando carpeta: $dir"
              rsync -av --exclude 'node_modules' --exclude 'dist' "$dir/" "main-branch/$dir/"
            fi
          done

          # 3. Copiar archivos esenciales de la raíz
          for file in .env.example pull.sh .htaccess .gitignore; do
            if [ -f "$file" ]; then
              cp -v "$file" main-branch/
            fi
          done

      # ---------------- INJECT FRESH BUILD (dist) ----------------
      - name: Inject fresh build into main-branch/website/dist
        run: |
          if [ -d "website/dist" ]; then
            echo "Inyectando build de producción en website/dist..."
            mkdir -p main-branch/website/dist
            rsync -av --delete website/dist/ main-branch/website/dist/
          fi

      # ---------------- PRODUCTION CONFIG & CLEANUP ----------------
      - name: Production configuration
        run: |
          # Crear .env de producción
          echo "APP_ENV=${{ secrets.APP_ENV }}" > main-branch/.env

          # Limpiar archivos prohibidos
          find main-branch/API -name "(DELETE)*.php" -delete 2>/dev/null || true

          # Asegurar .htaccess en la carpeta dist (priorizando el de website/public)
          if [ -f "main-branch/website/dist/.htaccess" ]; then
             echo ".htaccess ya existe en dist"
          elif [ -f "main-branch/.htaccess" ]; then
             cp main-branch/.htaccess main-branch/website/dist/.htaccess
          fi

          # Dar permisos al pull.sh
          if [ -f "main-branch/pull.sh" ]; then
            chmod +x main-branch/pull.sh
          fi

      # ---------------- COMMIT & PUSH TO MAIN ----------------
      - name: Commit and push changes to main
        run: |
          cd main-branch
          
          git config user.name "MarioCordero (CI)"
          git config user.email "ci+${{ github.repository_owner }}@users.noreply.github.com"

          # Registra cambios, nuevos archivos y ELIMINACIONES (limpia carpetas como .idea o Doc)
          git add -A

          # Forzamos dist y config por seguridad
          if [ -d "website/dist" ]; then
            git add -f website/dist/
          fi
          
          if [ -d "API/config" ]; then
            git add -f API/config/ 2>/dev/null || true
          fi

          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          # Commit actualizado con 'database' en el mensaje
          git commit -m "🚀 Clean Deploy: API, Mobile, Website, Database [$(date +'%Y-%m-%d %H:%M:%S')]"
          
          # Push forzado para garantizar que main sea idéntico al build actual
          git push "https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git" HEAD:main --force

      # ---------------- TRIGGER REMOTE DEPLOY ----------------
      - name: Trigger remote deploy
        run: |
          curl -X GET "http://163.178.171.105/pull.sh"
name: Force Deploy (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  force-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------- DETERMINAR RAMA ORIGEN ----------------
      - name: Set source branch
        run: |
          echo "SOURCE_BRANCH=develop" >> $GITHUB_ENV

      # ---------------- CHECKOUT RAMA ORIGEN (develop) ----------------
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      # ---------------- BUILD FRONTEND ----------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Frontend
        run: |
          cd website
          npm install
          npm run build

      # ---------------- CHECKOUT MAIN (En subcarpeta) ----------------
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ---------------- SYNC TOTAL HACIA main-branch ----------------
      - name: Sync everything and inject build
        run: |
          # 1. Sincronizar toda la estructura de archivos de develop a main
          # Excluimos .git, la propia carpeta de destino y archivos de despliegue
          rsync -av --delete \
            --exclude '.git/' \
            --exclude 'main-branch/' \
            --exclude 'website/node_modules/' \
            ./ main-branch/

          # 2. Inyectar el build de Vite en main-branch
          # Esto asegura que el dist esté actualizado aunque esté en .gitignore
          if [ -d "website/dist" ]; then
            echo "Injecting fresh build into main-branch/website/dist..."
            mkdir -p main-branch/website/dist
            rsync -av --delete website/dist/ main-branch/website/dist/
          fi

      # ---------------- CONFIGURACIÓN FINAL ----------------
      - name: Production Config & Cleanup
        run: |
          # Crear .env de producción
          echo "APP_ENV=${{ secrets.APP_ENV }}" > main-branch/.env
          
          # Limpiar archivos prohibidos en API
          find main-branch/API -name "(DELETE)*.php" -delete || true

          # Asegurar .htaccess en el dist
          if [ -f "website/dist/.htaccess" ]; then
            cp website/dist/.htaccess main-branch/website/dist/.htaccess
          elif [ -f "website/.htaccess" ]; then
            cp website/.htaccess main-branch/website/dist/.htaccess
          fi

          # Asegurar que pull.sh tenga permisos
          if [ -f "main-branch/pull.sh" ]; then
            chmod +x main-branch/pull.sh
          fi

      # ---------------- COMMIT & PUSH ----------------
      - name: Commit and push changes to main
        run: |
          cd main-branch
          git config user.name "MarioCordero (CI)"
          git config user.email "ci+${{ github.repository_owner }}@users.noreply.github.com"
          
          # Agregamos todo el contenido actualizado
          git add -A

          # FORZAMOS la carpeta dist (por si el .gitignore de develop la bloquea)
          if [ -d "website/dist" ]; then
            git add -f website/dist/
          fi
          
          # Forzamos otros archivos críticos
          git add -f .env 2>/dev/null || true
          if [ -d "API/config" ]; then
            git add -f API/config/ 2>/dev/null || true
          fi

          if git diff --cached --quiet; then
            echo "⚠️ No changes to deploy"
            exit 0
          fi

          git commit -m "🚀 Full sync & build from ${{ env.SOURCE_BRANCH }} [$(date +'%Y-%m-%d %H:%M:%S')]"
          
          # Push usando PAT hacia main
          git push "https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git" HEAD:main --force

      # ---------------- TRIGGER REMOTE DEPLOY ----------------
      - name: Trigger remote deploy
        run: |
          # Se recomienda usar un query string o header si el pull.sh requiere validación
          curl -X GET "http://163.178.171.105/pull.sh"